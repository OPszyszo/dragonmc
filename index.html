<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonMC Panel</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  padding: 25px;
  background: #1e293b;
  border-radius: 24px;
  box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(2px);
  transition: all 0.2s;
}

h2 {
  text-align: center;
  margin-top: 0;
  margin-bottom: 1.2rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

input, button {
  width: 100%;
  padding: 12px 14px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
  transition: 0.2s;
}

input {
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #334155;
}

input:focus {
  outline: none;
  border-color: #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,0.3);
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border: none;
}

button:hover {
  background: #16a34a;
  transform: translateY(-1px);
}

button:active {
  transform: translateY(1px);
}

.panel {
  display: none;
}

.role {
  margin: 15px 0 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: #334155;
  text-align: center;
  font-weight: 500;
  word-break: break-word;
}

.player-list {
  margin-top: 20px;
  background: #020617;
  padding: 12px 16px;
  border-radius: 18px;
  border-left: 4px solid #22c55e;
}

.player-list ul {
  margin: 8px 0 4px;
  padding-left: 20px;
}

.player-list li {
  margin: 5px 0;
  word-break: break-word;
}

.status-card {
  background: #0f172a;
  border-radius: 18px;
  padding: 12px 16px;
  margin: 15px 0;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 12px;
}

.status-item {
  background: #1e293b;
  padding: 8px 12px;
  border-radius: 40px;
  font-size: 0.9rem;
  flex: 1;
  text-align: center;
}

.logout {
  background: #ef4444;
  margin-top: 10px;
}

.logout:hover {
  background: #dc2626;
}

.button-group {
  display: flex;
  gap: 12px;
  margin: 10px 0 5px;
}

.button-group button {
  flex: 1;
}

#restartBtn {
  background: #3b82f6;
}

#restartBtn:hover {
  background: #2563eb;
}

#stopBtn {
  background: #f97316;
}

#stopBtn:hover {
  background: #ea580c;
}

@media (max-width: 500px) {
  .container {
    padding: 20px;
  }
  .button-group {
    flex-direction: column;
    gap: 8px;
  }
}
</style>
</head>
<body>

<div class="container" id="loginBox">
  <h2>🐉 DragonMC Login</h2>
  <input type="text" id="username" placeholder="Login" autocomplete="off">
  <input type="password" id="password" placeholder="Hasło">
  <button id="loginBtn">Zaloguj</button>
</div>

<div class="container panel" id="panel">
  <h2>⚙️ Panel DragonMC</h2>
  <div id="roleBox" class="role"></div>

  <div id="statusContainer"></div>

  <div class="player-list">
    <b>👥 Gracze online:</b>
    <ul id="players"></ul>
  </div>

  <div class="button-group">
    <button id="restartBtn">🔄 Restart</button>
    <button id="stopBtn">⛔ Stop</button>
  </div>
  <button class="logout" id="logoutBtn">🚪 Wyloguj</button>
</div>

<script>
// ======================= DANE UŻYTKOWNIKÓW (symulacja) =======================
const users = {
  "OPszyszo": { password: "15555", role: "Właściciel" },
  "orzpeter69": { password: ".dragonADM.", role: "Head Admin" }
};

// ======================= ZMIENNE GLOBALNE =======================
let currentUser = null;        // przechowuje dane zalogowanego użytkownika
let liveInterval = null;       // ID interwału do czyszczenia przy wylogowaniu

// Referencje do elementów DOM (ustawione po załadowaniu strony)
let loginBox, panel, roleBox, stopBtn, restartBtn, playersList, statusContainer, usernameInput, passwordInput;

// ======================= POMOCNICZE =======================
function clearLiveDataInterval() {
  if (liveInterval) {
    clearInterval(liveInterval);
    liveInterval = null;
  }
}

// Symulacja akcji serwerowych (restart / stop)
function performServerAction(actionType) {
  if (!currentUser) return;
  
  // Dodatkowe zabezpieczenie: tylko Właściciel może zatrzymać serwer
  if (actionType === 'stop' && currentUser.role !== 'Właściciel') {
    alert("❌ Brak uprawnień! Tylko Właściciel może zatrzymać serwer.");
    return;
  }
  
  let message = "";
  if (actionType === 'restart') message = "🔄 Restartowanie serwera... (symulacja)";
  else if (actionType === 'stop') message = "🛑 Zatrzymywanie serwera... (symulacja)";
  
  alert(message + "\n\nW rzeczywistej implementacji zostałoby wysłane polecenie do API.");
}

// Generowanie dynamicznych danych serwera (symulacja)
function updateServerStatus() {
  if (!currentUser) return;
  
  const online = Math.floor(Math.random() * 50) + 5;      // losowo 5-54 graczy
  const tps = (18 + Math.random() * 2).toFixed(2);        // TPS 18.00 - 20.00
  const uptimeMinutes = Math.floor(Math.random() * 720);  // symulowany uptime
  
  // Status "ONLINE" zawsze w tej symulacji
  statusContainer.innerHTML = `
    <div class="status-card">
      <div class="status-item">🟢 Status: <b style="color:#4ade80">ONLINE</b></div>
      <div class="status-item">👤 Gracze: <b>${online}</b></div>
      <div class="status-item">⚡ TPS: <b>${tps}</b></div>
      <div class="status-item">⏱️ Uptime: <b>${uptimeMinutes} min</b></div>
    </div>
  `;
  
  // Lista przykładowych graczy (losowa)
  const fakePlayersPool = ["Steve", "Alex", "DragonSlayer", "NoobMaster", "EnderKing", "Herobrine", "CreeperLover", "MinerPro", "Architekt", "PvPGod"];
  const playersCount = Math.floor(Math.random() * 6) + 1; // od 1 do 6 graczy
  const selectedPlayers = fakePlayersPool.slice(0, playersCount);
  
  playersList.innerHTML = "";
  selectedPlayers.forEach(player => {
    const li = document.createElement('li');
    li.textContent = player;
    playersList.appendChild(li);
  });
}

// Uruchomienie cyklicznego odświeżania danych (co 2 sekundy)
function startLiveData() {
  clearLiveDataInterval();          // usuń poprzedni interwał (jeśli istnieje)
  updateServerStatus();             // natychmiastowe pierwsze wywołanie
  liveInterval = setInterval(updateServerStatus, 2000);
}

// ======================= LOGOWANIE / WYLOGOWANIE =======================
function handleLogin() {
  const login = usernameInput.value.trim();
  const pwd = passwordInput.value;
  
  if (!login || !pwd) {
    alert("Wprowadź login i hasło.");
    return;
  }
  
  const user = users[login];
  if (user && user.password === pwd) {
    currentUser = { ...user, loginName: login };   // zapamiętujemy login i role
    
    // Przełącz widoki
    loginBox.style.display = "none";
    panel.style.display = "block";
    
    // Wyświetl rolę i nazwę użytkownika
    roleBox.innerHTML = `✅ Zalogowano jako: <b>${login}</b> (${currentUser.role})`;
    
    // Uprawnienia: przycisk STOP widoczny tylko dla Właściciela
    if (currentUser.role !== "Właściciel") {
      stopBtn.style.display = "none";
    } else {
      stopBtn.style.display = "block";
    }
    
    // Wyczyść pola logowania (dla porządku)
    usernameInput.value = "";
    passwordInput.value = "";
    
    // Uruchom symulację danych serwera
    startLiveData();
  } else {
    alert("❌ Błędny login lub hasło.");
    passwordInput.value = "";  // wyczyść hasło dla bezpieczeństwa
  }
}

function handleLogout() {
  // Zatrzymaj odświeżanie danych
  clearLiveDataInterval();
  currentUser = null;
  // Przywróć widok logowania
  loginBox.style.display = "block";
  panel.style.display = "none";
  // Dodatkowo zresetuj zawartość panelu, aby nie migały stare dane
  if (statusContainer) statusContainer.innerHTML = "";
  if (playersList) playersList.innerHTML = "";
  if (roleBox) roleBox.innerHTML = "";
}

// ======================= INICJALIZACJA I NASŁUCHIWANIE ZDARZEŃ =======================
document.addEventListener("DOMContentLoaded", () => {
  // Pobranie referencji do wszystkich elementów DOM
  loginBox = document.getElementById("loginBox");
  panel = document.getElementById("panel");
  roleBox = document.getElementById("roleBox");
  stopBtn = document.getElementById("stopBtn");
  restartBtn = document.getElementById("restartBtn");
  playersList = document.getElementById("players");
  statusContainer = document.getElementById("statusContainer");
  usernameInput = document.getElementById("username");
  passwordInput = document.getElementById("password");
  
  const loginButton = document.getElementById("loginBtn");
  const logoutButton = document.getElementById("logoutBtn");
  
  // Zdarzenia dla przycisków
  if (loginButton) loginButton.addEventListener("click", handleLogin);
  if (logoutButton) logoutButton.addEventListener("click", handleLogout);
  if (restartBtn) restartBtn.addEventListener("click", () => performServerAction("restart"));
  if (stopBtn) stopBtn.addEventListener("click", () => performServerAction("stop"));
  
  // Dodatkowa wygoda: logowanie po naciśnięciu Enter w polach hasła lub loginu
  const handleEnter = (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      handleLogin();
    }
  };
  usernameInput.addEventListener("keypress", handleEnter);
  passwordInput.addEventListener("keypress", handleEnter);
  
  // Ukryj przycisk stop na starcie (dopiero po zalogowaniu będzie widać, jeśli właściciel)
  // Zabezpieczenie: na początku panel jest ukryty, ale i tak ustawiamy domyślnie dla czystości kodu
  if (stopBtn) stopBtn.style.display = "block"; 
  // Upewniamy się, że panel startowy jest widoczny, a panel główny schowany
  loginBox.style.display = "block";
  panel.style.display = "none";
});
</script>

</body>
</html>
