<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>DragonMC Panel Administracyjny</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: #fff;
    }

    .login-container, .panel {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #ff4757;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff6b81;
    }

    .panel {
      display: none;
      max-width: 600px;
    }

    .server-info {
      margin-top: 20px;
    }

    .logout {
      margin-top: 20px;
      background: #57606f;
    }
  </style>
</head>
<body>

<div class="login-container" id="loginBox">
  <h2>🐉 DragonMC Login</h2>
  <input type="text" id="username" placeholder="Login">
  <input type="password" id="password" placeholder="Hasło">
  <button onclick="login()">Zaloguj się</button>
</div>

<div class="panel" id="adminPanel">
  <h2>Panel Administracyjny DragonMC</h2>
  <div class="server-info">
    <p>Status serwera: <b>Online</b></p>
    <p>Liczba graczy: <b>42</b></p>
    <p>TPS: <b>19.8</b></p>
  </div>

  <button onclick="alert('Restart serwera...')">Restart serwera</button>
  <button onclick="alert('Zatrzymywanie serwera...')">Zatrzymaj serwer</button>
  <button class="logout" onclick="logout()">Wyloguj</button>
</div>

<script>
  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // Proste dane logowania (do zmiany!)
    if (user === 'admin' && pass === 'dragon123') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
    } else {
      alert('Nieprawidłowe dane logowania!');
    }
  }

  function logout() {
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
  }
</script>

</body>
</html>
