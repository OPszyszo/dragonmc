<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>DragonMC Panel</title>
<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

.container {
  max-width:500px;
  margin:80px auto;
  padding:25px;
  background:#1e293b;
  border-radius:16px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2 {text-align:center;}

input, button {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {background:#4ade80;}

.panel {display:none;}

.role {
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  background:#334155;
}

.player-list {
  margin-top:15px;
  background:#020617;
  padding:10px;
  border-radius:10px;
}

.logout {background:#ef4444;}
</style>
</head>
<body>

<div class="container" id="loginBox">
  <h2>🐉 DragonMC Login</h2>
  <input id="username" placeholder="Login">
  <input id="password" type="password" placeholder="Hasło">
  <button onclick="login()">Zaloguj</button>
</div>

<div class="container panel" id="panel">
  <h2>Panel DragonMC</h2>
  <div id="roleBox" class="role"></div>

  <div id="status"></div>

  <div class="player-list">
    <b>Gracze online:</b>
    <ul id="players"></ul>
  </div>

  <button id="restartBtn" onclick="action('Restart serwera')">Restart</button>
  <button id="stopBtn" onclick="action('Stop serwera')">Stop</button>
  <button class="logout" onclick="logout()">Wyloguj</button>
</div>

<script>
const users = {
  "OPszyszo": {password:"15555", role:"Właściciel"},
  "orzpeter69": {password:".dragonADM.", role:"Head Admin"}
};

let currentUser = null;

function login(){
  const u = username.value;
  const p = password.value;

  if(users[u] && users[u].password === p){
    currentUser = users[u];
    loginBox.style.display='none';
    panel.style.display='block';
    roleBox.innerHTML = `Zalogowano jako: <b>${u}</b> (${currentUser.role})`;

    if(currentUser.role !== "Właściciel"){
      stopBtn.style.display='none';
    }

    startLiveData();
  } else {
    alert('Błędne dane');
  }
}

function logout(){
  location.reload();
}

function action(msg){
  alert(msg);
}

function startLiveData(){
  setInterval(()=>{
    // symulacja statusu
    const online = Math.floor(Math.random()*50);
    const tps = (18 + Math.random()*2).toFixed(2);

    document.getElementById('status').innerHTML = `
      <p>Status: <b style="color:lime">ONLINE</b></p>
      <p>Gracze: <b>${online}</b></p>
      <p>TPS: <b>${tps}</b></p>
    `;

    // fake lista graczy
    const fakePlayers = ["amongus_pet","orzpeter69","OP_pvp","kuba597","smerfurito"];
    const list = document.getElementById('players');
    list.innerHTML = '';

    fakePlayers.slice(0, Math.floor(Math.random()*fakePlayers.length)+1)
      .forEach(p=>{
        const li = document.createElement('li');
        li.textContent = p;
        list.appendChild(li);
      });

  },2000);
}
</script>

</body>
</html>
